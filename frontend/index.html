<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统镜像分发</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>系统镜像分发</h1>
    <nav>
      <a href="/" class="nav-link active">镜像列表</a>
      <a href="/admin" class="nav-link">管理</a>
      <button type="button" id="themeToggle" class="theme-toggle" title="切换主题">浅色</button>
    </nav>
  </header>

  <main id="app" class="app-with-sidebar">
    <aside class="left-sidebar">
      <section class="stable-section">
        <h2>固定发布</h2>
        <p class="hint">非每日构建的稳定产物，由管理员维护</p>
        <div id="stableImagesList" class="images-list">
          <p class="hint">加载中...</p>
        </div>
      </section>
    </aside>
    <div class="main-content">
      <section class="dates-section">
        <h2>按日期查看</h2>
        <div class="date-picker">
          <label>选择日期：</label>
          <select id="dateSelect">
            <option value="">加载中...</option>
          </select>
        </div>
      </section>
      <section class="images-section" id="imagesSection">
        <div id="pullHint" class="pull-hint" title="点击刷新">下拉刷新</div>
        <h2 id="imagesTitle">镜像文件</h2>
        <div id="imagesList" class="images-list">
          <p class="hint">加载中...</p>
        </div>
        <div id="loadMoreWrap" class="load-more-wrap hidden">
          <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
        </div>
      </section>
    </div>
  </main>

  <main id="admin-app" class="hidden">
    <section class="admin-section">
      <h2>超级管理员</h2>
      <div id="adminLogin" class="admin-login">
        <p class="hint">在 config.toml 中配置 admin_token 后，在此输入令牌以管理镜像（删除/上传）与构建。</p>
        <div class="form-row">
          <label>管理员令牌</label>
          <input type="password" id="adminTokenInput" placeholder="admin_token">
        </div>
        <button type="button" id="adminTokenBtn">验证并进入</button>
      </div>
      <div id="adminPanel" class="hidden">
        <p class="hint">已登录 · <button type="button" id="adminLogout" class="text-btn">退出</button></p>
        <h3>上传镜像</h3>
        <p class="hint">选择文件后上传，勾选「固定发布」则保存到左侧栏，否则保存到当日目录，重名自动加后缀</p>
        <div class="form-row form-row-inline">
          <label><input type="checkbox" id="adminUploadToStable"> 固定发布</label>
        </div>
        <div id="adminDropZone" class="drop-zone">
          <span class="drop-zone-text">将文件拖到此处，或点击下方选择文件</span>
        </div>
        <form id="adminUploadForm">
          <div class="form-row">
            <input type="file" id="adminFileInput" multiple>
          </div>
          <button type="submit">上传</button>
        </form>
        <h3>已有镜像（可删除）</h3>
        <div id="adminImagesList" class="images-list"></div>
        <h3>构建管理</h3>
        <p class="hint">在 config.toml 中配置定时构建任务，构建脚本需将产物放入 output 目录</p>
        <h4 class="admin-h4">手动触发构建</h4>
        <form id="buildForm">
          <div class="form-row">
            <label>名称</label>
            <input type="text" name="name" placeholder="build-name" required>
          </div>
          <div class="form-row">
            <label>间隔(分钟)</label>
            <input type="number" name="interval" value="60" min="1">
          </div>
          <div class="form-row">
            <label>构建脚本</label>
            <textarea name="script" rows="8" placeholder="#!/bin/bash&#10;mkdir -p output&#10;echo 'sample' > output/sample.txt"></textarea>
          </div>
          <button type="submit">立即构建</button>
        </form>
        <h4 class="admin-h4">构建日志</h4>
        <div id="buildLog" class="build-log"></div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
